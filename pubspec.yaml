name: admin_fmart
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.4.3
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  onesignal_flutter: 5.2.1
  uuid: ^4.5.1
  audioplayers: ^6.0.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.2.0
  cached_network_image: ^3.3.1

  intl: ^0.19.0

  sentry_flutter: ^9.0.0
  package_info_plus: ^8.0.0
  # In-app WebView for the Yandex courier sharing URL on order detail —
  # so admin can watch the courier on the map without leaving the app.
  webview_flutter: ^4.7.0
  # Skeleton placeholders for list loading states — gives a perceived
  # speed boost over a bare spinner. Matches the customer app's pattern.
  shimmer: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


flutter:
  assets:
    - assets/sounds/

  uses-material-design: true


